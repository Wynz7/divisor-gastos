<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisor de Gastos</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f2f2f2">
    <style>
        :root {
            --bg-color: #f2f2f2;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #ddd;
            --btn-primary: #a855f7;
            --btn-hover: #9333ea;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 20px; }

        .app-container { background-color: var(--card-bg); max-width: 500px; width: 100%; border-radius: 20px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--text-main); text-align: center; }

        .friend-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }

        .input-group { display: flex; flex-direction: column; flex: 1; background: var(--bg-color); padding: 8px 12px; border-radius: 12px; }
        .input-group label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        .input-group input { border: none; background: transparent; font-size: 1rem; color: var(--text-main); outline: none; width: 100%; }
        
        .amount-group { flex: 0.8; }
        .amount-wrapper { display: flex; align-items: center; }
        .amount-wrapper span { color: var(--text-muted); margin-right: 4px; }

        .remove-btn { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .remove-btn:hover { background-color: #ffe4e6; color: #e11d48; }

        .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        
        .btn { padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
        .btn-add { background-color: var(--bg-color); color: var(--text-main); }
        .btn-add:hover { background-color: var(--border-color); }
        .btn-calc { background: linear-gradient(135deg, #a855f7, #ec4899); color: white; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3); }
        .btn-calc:hover { opacity: 0.9; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; padding: 24px; border-radius: 20px 20px 0 0; animation: slideUp 0.3s ease-out; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; }
        .close-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
        
        .result-list { font-family: monospace; font-size: 1rem; line-height: 1.6; margin-bottom: 20px; white-space: pre-wrap; color: var(--text-main); }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Calculá cuánto dinero se deben entre cada uno</h2>
        <div id="friends-container">
            </div>
        
        <div class="actions">
            <button class="btn btn-add" onclick="addFriend()">+ Agregar Amigo</button>
            <button class="btn btn-calc" onclick="calculate()">Calcular División</button>
        </div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Cálculo</span>
                <button class="close-modal" onclick="closeModal()">×</button>
            </div>
            <div id="resultText" class="result-list"></div>
            <button class="btn btn-add" style="width: 100%" onclick="copyResults()">Copiar resultados ⎘</button>
        </div>
    </div>

    <script>
        let friendCount = 0;

        function addFriend(name = '', amount = '') {
            friendCount++;
            const container = document.getElementById('friends-container');
            const row = document.createElement('div');
            row.className = 'friend-row';
            row.id = `friend-${friendCount}`;
            
            row.innerHTML = `
                <div class="input-group">
                    <label>Amigo ${friendCount}</label>
                    <input type="text" class="friend-name" placeholder="Nombre" value="${name}">
                </div>
                <div class="input-group amount-group">
                    <label>Pagó</label>
                    <div class="amount-wrapper">
                        <span>$</span>
                        <input type="number" class="friend-amount" placeholder="0" value="${amount}" min="0" step="any">
                    </div>
                </div>
                <button class="remove-btn" onclick="removeFriend(${friendCount})">×</button>
            `;
            container.appendChild(row);
        }

        function removeFriend(id) {
            document.getElementById(`friend-${id}`).remove();
        }

        function calculate() {
            const rows = document.querySelectorAll('.friend-row');
            let people = [];
            let totalPaid = 0;

            // Recopilar datos
            rows.forEach((row, index) => {
                let name = row.querySelector('.friend-name').value.trim() || `Amigo ${index + 1}`;
                let amount = parseFloat(row.querySelector('.friend-amount').value) || 0;
                people.push({ name, paid: amount });
                totalPaid += amount;
            });

            if (people.length < 2) {
                alert("Agrega al menos 2 amigos para dividir gastos.");
                return;
            }

            let average = totalPaid / people.length;
            let debtors = [];
            let creditors = [];
            let settled = []; // Lista para los que pusieron lo justo

            // Separar deudores, acreedores y los que están a mano
            people.forEach(p => {
                let balance = p.paid - average;
                
                // Usamos 0.01 para evitar problemas con los decimales en JavaScript
                if (balance < -0.01) {
                    debtors.push({ name: p.name, owe: Math.abs(balance) });
                } else if (balance > 0.01) {
                    creditors.push({ name: p.name, owed: balance });
                } else {
                    settled.push(p.name); // El balance es 0
                }
            });

            let results = [];
            let i = 0, j = 0;

            // Emparejar deudas
            while (i < debtors.length && j < creditors.length) {
                let debtor = debtors[i];
                let creditor = creditors[j];
                let amountToSettle = Math.min(debtor.owe, creditor.owed);

                results.push(`${debtor.name} le debe a ${creditor.name}: $${amountToSettle.toFixed(2)}`);

                debtor.owe -= amountToSettle;
                creditor.owed -= amountToSettle;

                if (debtor.owe < 0.01) i++;
                if (creditor.owed < 0.01) j++;
            }

            // Agregar a la lista de resultados a los que pusieron lo justo
            settled.forEach(name => {
                results.push(`${name} NO le debe a nadie.`);
            });

            if (results.length === 0) {
                document.getElementById('resultText').innerText = "¡Todo está saldado! Nadie le debe a nadie.";
            } else {
                document.getElementById('resultText').innerText = results.join('\n');
            }
            
            document.getElementById('resultModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        function copyResults() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("¡Resultados copiados al portapapeles!");
            });
        }

        // Iniciar con 2 casilleros vacíos por defecto
        window.onload = () => {
            addFriend();
            addFriend();
        };
    </script>
</body>
</html>
